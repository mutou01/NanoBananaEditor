
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>GPT-Image-2 · 文生图 / 以图生图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(145deg, #0b0b1a 0%, #1a1a3e 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      background: rgba(22, 22, 40, 0.9);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 28px 30px;
      max-width: 850px;
      width: 100%;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(203, 166, 247, 0.15);
      margin-top: 20px;
    }
    h1 {
      text-align: center;
      color: #f0e6ff;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .subtitle {
      text-align: center;
      color: #9b9bb5;
      font-size: 14px;
      margin-bottom: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .mode-switch {
      display: flex;
      background: #25253e;
      border-radius: 40px;
      padding: 4px;
      margin: 0 auto 20px;
      width: fit-content;
      border: 1px solid #3e3e5c;
    }
    .mode-btn {
      padding: 10px 28px;
      border-radius: 32px;
      font-size: 15px;
      font-weight: 550;
      background: transparent;
      color: #b9b9d4;
      border: none;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mode-btn.active {
      background: #6d5acb;
      color: white;
      box-shadow: 0 6px 14px rgba(109, 90, 203, 0.45);
      font-weight: 600;
    }
    .reference-area {
      background: #1b1b32;
      border: 2px dashed #43436b;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 22px;
      transition: border-color 0.2s, opacity 0.2s;
    }
    .reference-area.hidden-mode {
      display: none;
    }
    .reference-label {
      color: #c5c5e0;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .upload-zone {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
    }
    .upload-btn-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }
    .upload-btn {
      background: #2d2d4a;
      color: #e0d7ff;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #545482;
      transition: 0.2s;
    }
    .upload-btn:hover {
      background: #40406a;
      border-color: #b4a0ff;
    }
    .upload-btn-wrapper input {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .reference-previews {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      flex: 1;
    }
    .ref-preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #4b4b75;
      background: #23233e;
    }
    .ref-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .remove-ref {
      position: absolute;
      top: 3px;
      right: 3px;
      background: rgba(0,0,0,0.75);
      color: #ffa6b5;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
    }
    .prompt-area {
      margin-bottom: 18px;
    }
    .prompt-area label {
      color: #b7b7d9;
      font-size: 12px;
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .prompt-area textarea {
      width: 100%;
      padding: 14px;
      background: #262644;
      border: 1px solid #45457a;
      border-radius: 14px;
      color: #eaeaff;
      font-size: 14px;
      resize: vertical;
      min-height: 95px;
      font-family: inherit;
      transition: 0.2s;
    }
    .prompt-area textarea:focus {
      outline: none;
      border-color: #b7a4ff;
    }
    .char-count {
      text-align: right;
      color: #7b7b9e;
      font-size: 11px;
      margin-top: 5px;
    }
    .quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .quick-tags span {
      background: #2c2c4a;
      color: #cccef0;
      padding: 6px 14px;
      border-radius: 24px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #4e4e7a;
      transition: 0.2s;
    }
    .quick-tags span:hover {
      background: #4c4c7a;
      border-color: #c3b5ff;
      color: white;
    }
    .form-row {
      display: flex;
      gap: 14px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .form-group {
      flex: 1;
      min-width: 120px;
    }
    .form-group label {
      color: #b7b7d9;
      font-size: 12px;
      font-weight: 600;
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group select {
      width: 100%;
      padding: 11px 12px;
      background: #262644;
      border: 1px solid #45457a;
      border-radius: 10px;
      color: #e0e0ff;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .form-group select:focus {
      outline: none;
      border-color: #b7a4ff;
    }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(120deg, #b38ef7, #6fa6ff);
      color: #0b0b1e;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.4px;
      transition: 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:active {
      transform: scale(0.98);
    }
    button:disabled {
      background: #3d3d62;
      color: #8888aa;
      cursor: not-allowed;
      transform: none;
    }
    #result {
      margin-top: 26px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 80px;
    }
    #result img {
      max-width: 100%;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }
    .loading {
      color: #c8c8f0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #4f4f7a;
      border-top: 2px solid #c7adff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      color: #ffb1c1;
      background: rgba(255,140,160,0.12);
      padding: 14px;
      border-radius: 12px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      border: 1px solid rgba(255,140,160,0.25);
    }
    .download-btn {
      margin-top: 14px;
      padding: 10px 24px;
      background: #9fd9a0;
      color: #12122a;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      transition: opacity 0.2s;
    }
    .download-btn:hover {
      opacity: 0.8;
    }
    .info-note {
      color: #9c9cc0;
      text-align: center;
      font-size: 12px;
      margin-top: 18px;
      background: #1e1e38;
      padding: 10px;
      border-radius: 10px;
    }
    .ref-hint {
      color: #7b7b9e;
      font-size: 12px;
      margin-top: 8px;
    }
    @media (max-width: 550px) {
      .container {
        padding: 20px;
      }
      .form-row {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✨ GPT-Image-2</h1>
  <div class="subtitle">
    <span>文生图 · 以图生图 智能切换</span>
  </div>

  <!-- 模式切换 -->
  <div class="mode-switch" id="modeSwitch">
    <button class="mode-btn active" data-mode="text2img">📝 文字生图</button>
    <button class="mode-btn" data-mode="img2img">🖼️ 以图生图</button>
  </div>

  <!-- 参考图上传区 (以图生图模式显示) -->
  <div class="reference-area" id="referenceArea">
    <div class="reference-label">
      <span>📸</span> 参考图片（上传1-4张）
    </div>
    <div class="upload-zone">
      <div class="upload-btn-wrapper">
        <div class="upload-btn">+ 上传图片</div>
        <input type="file" id="refImageInput" accept="image/jpeg,image/png,image/webp" multiple>
      </div>
      <div class="reference-previews" id="referencePreviews"></div>
    </div>
    <div class="ref-hint">💡 根据 OpenAI 官方文档：使用 Edits API 端点，GPT-Image-2 会参考上传的图片生成新图</div>
  </div>

  <!-- Prompt -->
  <div class="prompt-area">
    <label id="promptLabel">📝 图像描述 (Prompt)</label>
    <textarea id="prompt" placeholder="例如：一只穿着宇航服的柴犬在月球上漫步，数字艺术风格"></textarea>
    <div class="char-count"><span id="wordCount">0</span> 词</div>
  </div>

  <!-- 快速标签 -->
  <div class="quick-tags">
    <span onclick="appendTag('赛博朋克城市夜景，霓虹灯光，雨天反光，高细节')">🌃 赛博朋克</span>
    <span onclick="appendTag('印象派油画风格，梦幻花园，柔和色调，笔触明显')">🎨 油画花园</span>
    <span onclick="appendTag('极简主义建筑，白色混凝土，光影交错，干净构图')">🏛️ 极简建筑</span>
    <span onclick="appendTag('可爱猫咪穿着侦探风衣，胶片质感，柔和光线')">🐱 侦探猫</span>
    <span onclick="appendTag('透明玻璃球里的微型森林，奇幻光效，微距摄影')">🔮 魔法森林</span>
    <span onclick="appendTag('复古80年代蒸汽波风格，粉紫色天空，合成器波浪')">🌴 蒸汽波</span>
  </div>

  <!-- 参数区 -->
  <div class="form-row">
    <div class="form-group">
      <label>📏 分辨率</label>
      <select id="size">
        <optgroup label="快速方形">
          <option value="1024x1024" selected>1024×1024 (方形 1:1)</option>
        </optgroup>
        <optgroup label="标清">
          <option value="1536x1024">1536×1024 (横版 3:2)</option>
          <option value="1024x1536">1024×1536 (竖版 2:3)</option>
        </optgroup>
        <optgroup label="2K">
          <option value="2048x2048">2048×2048 (方形 2K)</option>
          <option value="2048x1152">2048×1152 (横版 2K)</option>
          <option value="1152x2048">1152×2048 (竖版 2K)</option>
        </optgroup>
        <optgroup label="4K (实验性)">
          <option value="3840x2160">3840×2160 (横版 4K)</option>
          <option value="2160x3840">2160×3840 (竖版 4K)</option>
        </optgroup>
        <optgroup label="自动">
          <option value="auto">自动 (AI 选择最佳尺寸)</option>
        </optgroup>
      </select>
    </div>
    <div class="form-group">
      <label>✨ 画质</label>
      <select id="quality">
        <option value="low">低 (快速预览)</option>
        <option value="medium" selected>中 (平衡)</option>
        <option value="high">高 (最佳品质)</option>
        <option value="auto">自动</option>
      </select>
    </div>
  </div>

  <button id="generateBtn" onclick="generateImage()">🚀 GPT-Image-2 生成图片</button>

  <div id="result"></div>
  <div class="info-note" id="infoNote">
    ⚡ 文字生图使用 Generations API · 以图生图使用 Edits API
  </div>
</div>

<script>
  (function() {
    // ---------- 配置 ----------
    const API_KEY = 'sk-gz05xF8kN1Cq6LFLUy1UhDlTa0soVALwsAZ0lbUoCSzuoO2p';
    // 根据模式动态切换端点
    const GENERATION_URL = 'https://freeapi.dgbmc.top/v1/images/generations'; // 文字生图
    const EDITS_URL = 'https://freeapi.dgbmc.top/v1/images/edits';           // 以图生图

    // 状态
    let currentMode = 'text2img'; // 'text2img' 或 'img2img'
    let referenceImages = [];     // 存储 { file, dataUrl }

    // DOM 元素
    const modeBtns = document.querySelectorAll('.mode-btn');
    const referenceArea = document.getElementById('referenceArea');
    const promptLabel = document.getElementById('promptLabel');
    const refInput = document.getElementById('refImageInput');
    const previewsContainer = document.getElementById('referencePreviews');
    const promptTextarea = document.getElementById('prompt');
    const wordCountSpan = document.getElementById('wordCount');
    const generateBtn = document.getElementById('generateBtn');
    const resultDiv = document.getElementById('result');
    const sizeSelect = document.getElementById('size');
    const qualitySelect = document.getElementById('quality');
    const infoNote = document.getElementById('infoNote');

    // ========== 模式切换逻辑 ==========
    function setMode(mode) {
      currentMode = mode;
      // 更新按钮激活样式
      modeBtns.forEach(btn => {
        const btnMode = btn.dataset.mode;
        if (btnMode === mode) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      // 显示/隐藏参考图区域
      if (mode === 'img2img') {
        referenceArea.classList.remove('hidden-mode');
        promptLabel.textContent = '📝 修改描述 (基于参考图)';
        infoNote.innerHTML = '🎯 以图生图模式 · Edits API · 上传参考图 + 描述变化';
        // 保留已上传图片
      } else {
        referenceArea.classList.add('hidden-mode');
        promptLabel.textContent = '📝 图像描述 (Prompt)';
        infoNote.innerHTML = '✨ 文字生图模式 · Generations API · 纯文本描述生成图像';
        // 不清除参考图片，但生成时会忽略
      }
      // 清空结果
      resultDiv.innerHTML = '';
    }

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        setMode(btn.dataset.mode);
      });
    });

    // 初始状态：文字生图模式，上传区隐藏
    setMode('text2img');

    // ========== 参考图管理 ==========
    function updatePreviews() {
      previewsContainer.innerHTML = '';
      referenceImages.forEach((imgData, idx) => {
        const div = document.createElement('div');
        div.className = 'ref-preview-item';
        div.innerHTML = `
          <img src="${imgData.dataUrl}" alt="参考图 ${idx + 1}">
          <div class="remove-ref" data-index="${idx}">✕</div>
        `;
        previewsContainer.appendChild(div);
      });

      document.querySelectorAll('.remove-ref').forEach(el => {
        el.addEventListener('click', (e) => {
          const idx = parseInt(el.dataset.index);
          referenceImages.splice(idx, 1);
          updatePreviews();
        });
      });
    }

    refInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      const maxFiles = 4;
      const remaining = maxFiles - referenceImages.length;
      
      if (files.length > remaining) {
        alert(`最多上传 ${maxFiles} 张参考图，当前已有 ${referenceImages.length} 张`);
        return;
      }
      
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        referenceImages.push({
          file: file,
          dataUrl: URL.createObjectURL(file)
        });
      }
      
      updatePreviews();
      refInput.value = '';
      
      // 如果当前是文字生图模式且有参考图，提示用户
      if (currentMode === 'text2img' && referenceImages.length > 0) {
        console.log('已添加参考图，可切换至以图生图模式使用它们。');
      }
    });

    // ========== 工具函数 ==========
    window.appendTag = function(tag) {
      const current = promptTextarea.value.trim();
      promptTextarea.value = current ? `${current}, ${tag}` : tag;
      updateWordCount();
      promptTextarea.focus();
    };

    function updateWordCount() {
      const text = promptTextarea.value.trim();
      const count = text ? text.split(/\s+/).filter(w => w.length > 0).length : 0;
      wordCountSpan.textContent = count;
    }
    promptTextarea.addEventListener('input', updateWordCount);

    function base64ToBlob(base64, mimeType) {
      const byteChars = atob(base64.split(',')[1]);
      const byteArrays = [];
      
      for (let offset = 0; offset < byteChars.length; offset += 512) {
        const slice = byteChars.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);
        
        for (let i = 0; i < slice.length; i++) {
          byteNumbers[i] = slice.charCodeAt(i);
        }
        
        byteArrays.push(new Uint8Array(byteNumbers));
      }
      
      return new Blob(byteArrays, { type: mimeType });
    }

    // ========== 核心生成函数 ==========
    window.generateImage = async function() {
      const prompt = promptTextarea.value.trim();
      const size = sizeSelect.value;
      const quality = qualitySelect.value;

      if (!prompt) {
        resultDiv.innerHTML = '<div class="error">⚠️ 请输入图像描述</div>';
        return;
      }

      // 模式校验
      if (currentMode === 'img2img' && referenceImages.length === 0) {
        resultDiv.innerHTML = '<div class="error">📸 以图生图模式需要至少1张参考图片</div>';
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = '⏳ GPT-Image-2 处理中...';
      resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>正在生成图片...（可能需要1-2分钟）</div>';

      try {
        let response;
        
        if (currentMode === 'text2img') {
          // ---- 文字生图：使用 /v1/images/generations ----
          const body = JSON.stringify({
            model: 'gpt-image-2',
            prompt: prompt,
            n: 1,
            size: size,
            quality: quality,
            response_format: 'b64_json'  // 便于直接展示
          });

          console.log('发送 Generations API 请求...');
          console.log('- 端点:', GENERATION_URL);
          console.log('- 模型:', 'gpt-image-2');
          console.log('- 分辨率:', size);
          console.log('- 画质:', quality);

          response = await fetch(GENERATION_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${API_KEY}`
            },
            body: body
          });
        } else {
          // ---- 以图生图：使用 /v1/images/edits (multipart) ----
          const formData = new FormData();
          formData.append('model', 'gpt-image-2');
          formData.append('prompt', prompt);
          formData.append('size', size);
          formData.append('quality', quality);
          formData.append('n', '1');

          // 添加所有参考图
          for (const img of referenceImages) {
            if (img.file) {
              formData.append('image', img.file, img.file.name);
            } else if (img.dataUrl) {
              const blob = base64ToBlob(img.dataUrl, 'image/png');
              formData.append('image', blob, 'reference.png');
            }
          }

          console.log('发送 Edits API 请求...');
          console.log('- 端点:', EDITS_URL);
          console.log('- 模型:', 'gpt-image-2');
          console.log('- 参考图数量:', referenceImages.length);
          console.log('- 分辨率:', size);
          console.log('- 画质:', quality);

          response = await fetch(EDITS_URL, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${API_KEY}`
              // ⚠️ 不设置 Content-Type，浏览器会自动设置 multipart/form-data
            },
            body: formData
          });
        }

        const data = await response.json();
        console.log('API 响应状态:', response.status);
        console.log('API 响应数据:', data);

        if (!response.ok) {
          let errorMsg = `生成失败 (${response.status})`;
          if (response.status === 401) errorMsg = '❌ API密钥无效或已过期';
          else if (response.status === 429) errorMsg = '⏰ 请求过于频繁，请稍后再试';
          else if (response.status === 400) errorMsg = `❌ 请求参数错误: ${data.error?.message || '请检查参数'}`;
          else if (data.error?.message) errorMsg = `❌ ${data.error.message}`;
          throw new Error(errorMsg);
        }

        // 显示结果
        if (data.data && data.data.length > 0) {
          let html = '<div style="display: flex; flex-direction: column; gap: 20px; width: 100%;">';

          data.data.forEach((item, index) => {
            let imgSrc = '';
            if (item.b64_json) {
              imgSrc = `data:image/png;base64,${item.b64_json}`;
            } else if (item.url) {
              imgSrc = item.url;
            }

            if (imgSrc) {
              html += `
                <div style="text-align: center;">
                  <div style="margin-bottom: 8px; color: #a6adc8; font-size: 13px;">
                    生成结果 ${data.data.length > 1 ? `#${index + 1}` : ''}
                  </div>
                  <img src="${imgSrc}" alt="GPT-Image-2 生成" style="max-width: 100%; border-radius: 12px;" />
                  <div style="margin-top: 10px;">
                    <a class="download-btn" href="${imgSrc}" download="gpt-image-2_${Date.now()}_${index + 1}.png">
                      💾 下载图片
                    </a>
                  </div>
                </div>`;
            }
          });

          html += '</div>';
          
          // 显示生成信息
          const modeText = currentMode === 'text2img' ? '文字生图' : '以图生图';
          const refInfo = currentMode === 'img2img' ? ` | 参考图: ${referenceImages.length}张` : '';
          html += `<div class="info-note" style="margin-top: 12px;">
                      ✅ GPT-Image-2 ${modeText} ${refInfo}
                      | 分辨率: ${size} | 画质: ${quality}
                   </div>`;

          resultDiv.innerHTML = html;
        } else {
          throw new Error('API 返回数据异常，未包含图像数据');
        }

      } catch (error) {
        console.error('生成失败:', error);
        resultDiv.innerHTML = `
          <div class="error">
            ❌ ${error.message}
            <br><br>
            <small style="color: #6c7086;">
              调试信息：<br>
              模式: ${currentMode === 'text2img' ? '文字生图' : '以图生图'}<br>
              端点: ${currentMode === 'text2img' ? GENERATION_URL : EDITS_URL}<br>
              模型: gpt-image-2<br>
              ${currentMode === 'img2img' ? `参考图: ${referenceImages.length}张<br>` : ''}
              分辨率: ${size} | 画质: ${quality}<br>
              Prompt: ${prompt.substring(0, 100)}...
            </small>
          </div>`;
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = '🚀 GPT-Image-2 生成图片';
      }
    };

    // Ctrl+Enter 快捷键
    promptTextarea.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        generateImage();
      }
    });

    // 初始化
    updateWordCount();
  })();
</script>
